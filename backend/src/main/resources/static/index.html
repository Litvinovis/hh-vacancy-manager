<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,450;9..144,550;9..144,650&family=Nunito+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ═══════ LOGIN ═══════ -->
<div class="login-view" id="login-view" style="display:none">
  <div class="login-box">
    <div class="logo" style="justify-content:center;margin-bottom:8px">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">HH Monitor</div>
      </div>
    </div>
    <p class="login-sub">Войдите, чтобы увидеть свою подборку вакансий</p>
    <input type="text" id="login-username" class="search-inp login-inp" placeholder="Логин" autocomplete="username"
           onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()">
    <input type="password" id="login-password" class="search-inp login-inp" placeholder="Пароль" autocomplete="current-password"
           onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-prim" onclick="doLogin()" style="width:100%">Войти</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div class="app" id="app-root" style="display:none">
  <!-- ═══════ SIDEBAR ═══════ -->
  <div class="sidebar">
    <div class="sb">
      <div class="logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg>
        </div>
        <div class="logo-text">
          <div class="logo-name">HH Monitor</div>
          <div class="logo-sub">Уфа · подборка вакансий</div>
        </div>
        <div class="theme-tg">
          <button class="theme-b" data-theme="light" title="Светлая">☀️</button>
          <button class="theme-b" data-theme="dark" title="Тёмная">🌙</button>
        </div>
      </div>

      <div class="user-badge" id="user-badge"></div>

      <div class="nav-label">Фильтры</div>
      <div class="nav-item active" data-filter="all">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>
        <span class="lbl">Все</span><span class="count" id="cnt-all">0</span>
      </div>
      <div class="nav-item" data-filter="new">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l2.6 6.6L21 10l-5 4.4L17.4 21 12 17.3 6.6 21 8 14.4 3 10l6.4-1.4z" stroke-linejoin="round"/></svg></span>
        <span class="lbl">Новые</span><span class="count" id="cnt-new">0</span>
      </div>
      <div class="nav-item" data-filter="pending">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round"/></svg></span>
        <span class="lbl">Не оценено</span><span class="count" id="cnt-pending">0</span>
      </div>
      <div class="nav-item" data-filter="favorite">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.6-10-9.3C.4 8 2 4.5 5.4 4A5 5 0 0112 6.5 5 5 0 0118.6 4C22 4.5 23.6 8 22 11.7 19.5 16.4 12 21 12 21z"/></svg></span>
        <span class="lbl">Избранное</span><span class="count" id="cnt-favorite">0</span>
      </div>
      <div class="nav-item" data-filter="applied">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13" stroke-linecap="round"/><path d="M22 2l-7 20-4-9-9-4z" stroke-linejoin="round"/></svg></span>
        <span class="lbl">Отклик</span><span class="count" id="cnt-applied">0</span>
      </div>
      <div class="nav-item" data-filter="rejected">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9.5l5 5m0-5l-5 5" stroke-linecap="round"/></svg></span>
        <span class="lbl">Отклонено</span><span class="count" id="cnt-rejected">0</span>
      </div>
      <div class="nav-item" data-filter="fraud">
        <span class="ico"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01" stroke-linecap="round"/><path d="M10.3 3.9L2.5 18a2 2 0 0 0 1.7 3h15.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></span>
        <span class="lbl">Обман</span><span class="count" id="cnt-fraud">0</span>
      </div>

      <div class="today-card">
        <div class="h">Прогресс анализа</div>
        <div class="row"><span class="big" id="progress-pct">0%</span></div>
        <div class="bar"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="sub-row"><span>Средний скор <b id="stat-score">—</b></span><span>Ср. ЗП <b id="stat-salary">—</b></span></div>
      </div>

      <div class="sidebar-actions">
        <button class="btn btn-prim" onclick="runPipeline()">▶ Запустить оценку</button>
        <button class="btn btn-second" onclick="analyzePending()" id="btn-analyze-pending">⏳ Оценить все</button>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="showReanalyzeModal()">🔄 Переоц.</button>
          <button class="btn btn-ghost" onclick="exportData()">⇩ Экспорт</button>
        </div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="showCabinetModal()">👤 Кабинет</button>
          <button class="btn btn-ghost hidden" id="btn-admin" onclick="showAdminModal()">🛡 Админка</button>
        </div>
        <button class="btn btn-ghost hidden" id="btn-settings" onclick="showSettingsModal()">⚙ Настройки</button>
        <button class="btn btn-ghost" onclick="doLogout()">↪ Выход</button>
      </div>
    </div>
  </div>

  <!-- ═══════ MAIN ═══════ -->
  <div class="main">
    <div class="topbar">
      <div class="page-title">Здравствуйте! Вот, что <span class="accent">подходит</span></div>

      <div class="search-row">
        <div class="search-box">
          <span class="search-ico"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3" stroke-linecap="round"/></svg></span>
          <input class="search-inp" id="search-input" placeholder="Поиск по названию, компании, адресу…">
        </div>
        <button class="btn-ico" id="btn-notify-toggle" onclick="toggleNotifications()" title="Уведомления">🔔</button>
        <button class="btn-ico" onclick="loadStats();loadVacancies(1)" title="Обновить">↻</button>
      </div>

      <div class="filters-row">
        <select class="filter-sel" id="person-filter">
          <option value="">Все люди</option>
        </select>
        <select class="filter-sel" id="search-name-filter">
          <option value="">Все поиски</option>
        </select>
        <div class="filter-div"></div>
        <select class="filter-sel" id="district-filter">
          <option value="">Все районы</option>
        </select>
        <select class="filter-sel" id="tag-filter">
          <option value="">Все теги</option>
        </select>
        <div class="filter-div"></div>
        <input type="number" class="filter-num filter-sel" id="salary-filter" placeholder="от, ₽" min="0" step="5000">
        <input type="number" class="filter-num filter-sel" id="score-filter" placeholder="скор ≥" min="0" max="100" step="5">
        <label class="filter-check">
          <input type="checkbox" id="has-salary-filter" class="filter-sel">
          Только с ЗП
        </label>
        <div class="filter-div"></div>
        <select class="filter-sel" id="remote-filter">
          <option value="">Любой формат</option>
          <option value="true">Удалёнка</option>
          <option value="false">Офис</option>
        </select>
        <select class="filter-sel" id="sort-filter">
          <option value="score_desc">Скор ↓</option>
          <option value="score_asc">Скор ↑</option>
          <option value="salary_desc">Зарплата ↓</option>
          <option value="salary_asc">Зарплата ↑</option>
          <option value="date_desc">Новые</option>
          <option value="date_asc">Старые</option>
        </select>
      </div>

      <div class="chips-row" id="chips-row"></div>
    </div>

    <div class="list-cont" id="list-container">
      <div class="cards" id="vacancy-list-wrap">
        <div class="empty" id="empty-state">
          <div class="icon">📭</div>
          <div class="text">Нет вакансий</div>
          <div class="sub">Нажмите «Запустить оценку» для сбора данных</div>
        </div>
        <div id="vacancy-list" style="display:contents"></div>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ═══════ DETAIL ═══════ -->
  <div class="detail hidden" id="detail-panel"></div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
