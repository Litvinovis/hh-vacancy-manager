# HH Vacancy Manager — Scoring Rules
# Правила применяются последовательно, стартовый скор = 50
# match: regex или строка для поиска (case-insensitive)
# field: где искать (title|description|address|title|description)
# score: +N или -N
# reason: причина для отображения

rules:
  # ── Приоритетные районы ──
  - match: "шакша"
    field: "title|description|address"
    score: +30
    reason: "Шакша — приоритетный район"

  - match: "калининский"
    field: "title|description|address"
    score: +10
    reason: "Калининский район"

  # ── Подходящие должности ──
  - match: "консультант"
    field: "title"
    score: +15
    reason: "Консультант — соответствует опыту"

  - match: "продавец"
    field: "title"
    score: +10
    reason: "Продавец — соответствует опыту"

  - match: "администратор"
    field: "title"
    score: +10
    reason: "Администратор — подходит"

  - match: "оператор"
    field: "title"
    score: +5
    reason: "Оператор — может подойти"

  - match: "менеджер"
    field: "title"
    score: +5
    reason: "Менеджер — может подойти"

  - match: "помощник руководителя|ассистент"
    field: "title"
    score: +15
    reason: "Помощник руководителя — подходит"

  - match: "секретарь|референт"
    field: "title"
    score: +10
    reason: "Секретарь — подходит"

  - match: "диспетчер|координатор"
    field: "title"
    score: +10
    reason: "Диспетчер — подходит"

  - match: "модератор"
    field: "title"
    score: +10
    reason: "Модератор — подходит"

  - match: "обработки чатов|чат-поддержки|специалист чат"
    field: "title"
    score: +20
    reason: "Работа в чатах — отлично подходит"

  - match: "специалист поддержки"
    field: "title"
    score: +5
    reason: "Специалист поддержки — может подойти"

  # ── Не подходит — кол-центр / телефон ──
  - match: "кол-центр|call-центр|call center|контактный центр|контакт-центр"
    field: "title|description"
    score: -50
    reason: "Кол-центр / телефонная поддержка"

  - match: "холодн|холодные звонки"
    field: "title|description"
    score: -40
    reason: "Холодные звонки"

  - match: "телефон|телефонные продажи"
    field: "title|description"
    score: -30
    reason: "Телефонные продажи"

  # ── Не подходит — физический труд ──
  - match: "водитель|курьер|грузчик|разнорабочий"
    field: "title"
    score: -50
    reason: "Физический труд / доставка"

  - match: "склад|комплектовщик|сборщик|фасовщик|упаковщик"
    field: "title"
    score: -50
    reason: "Склад / производство"

  - match: "производство|завод|цех"
    field: "title|description"
    score: -40
    reason: "Производство / завод"

  - match: "физическ|ручной труд"
    field: "title|description"
    score: -40
    reason: "Физический труд"

  # ── Не подходит — супермаркеты ──
  - match: "супермаркет|гипермаркет|пятёрочка|магнит|лента|дикси|перекрёсток"
    field: "title|description"
    score: -30
    reason: "Супермаркет"

  # ── Не подходит — вахта ──
  - match: "вахта|вахтовый"
    field: "title|description"
    score: -40
    reason: "Вахта"

  # ── Не подходит — IT / продвинутые навыки ──
  - match: "программист|разработчик|тестировщик|devops|системный администратор"
    field: "title"
    score: -50
    reason: "IT-специалист — требуются продвинутые навыки"

  - match: "аналитик данных|data scientist|1С программист"
    field: "title"
    score: -40
    reason: "Аналитик / программист"

  # ── Не подходит — фриланс ──
  - match: "фриланс|самозанятость|1099"
    field: "title|description"
    score: -30
    reason: "Фриланс / самозанятость"

  # ── Не подходит — маркетолог ──
  - match: "маркетолог|smm|контент-маркетолог"
    field: "title"
    score: -30
    reason: "Маркетолог — требуются продвинутые ПК-навыки"

  # ── Не подходит — повар ──
  - match: "повар|кухар|кулинар"
    field: "title"
    score: -40
    reason: "Повар — не подходит по профилю"

  # ── Не подходит — техподдержка ──
  - match: "технической поддержки|техподдержки|техподдержка"
    field: "title"
    score: -30
    reason: "Техническая поддержка — IT-навыки"

  # ── Не подходит — старший / ведущий ──
  - match: "^ведущий|^старший"
    field: "title"
    score: -15
    reason: "Ведущий/старший — требуется больше опыта"

  # ── Не подходит — менеджер по продажам ──
  - match: "менеджер по продажам"
    field: "title"
    score: -25
    reason: "Менеджер по продажам — вероятны холодные звонки"
