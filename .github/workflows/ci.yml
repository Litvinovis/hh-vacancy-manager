name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: cd backend && mvn -B package -DskipTests

      - name: Run tests
        run: cd backend && mvn test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: hh-gui-jar
          path: backend/target/hh-gui-*.jar
          retention-days: 7

  # Браузерный смоук фронтенда: реальный Chromium против собранного jar на
  # scratch-БД — ловит расхождения контрактов фронт↔бэк (имена query-параметров,
  # формы ответов), которые юнит-тесты бэкенда не видят в принципе.
  frontend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright
          npx playwright install --with-deps chromium

      - name: Run frontend smoke test
        run: bash scripts/run-frontend-smoke.sh
