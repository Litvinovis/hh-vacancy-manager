name: Build & Deploy — HH Vacancy Manager

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        run: cd backend && mvn package -B

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hh-gui-jar
          path: backend/target/hh-gui-*.jar
          retention-days: 7

  deploy:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build
        run: cd backend && mvn package -B -DskipTests

      - name: Deploy scraper sidecar
        run: |
          DEPLOY_DIR=/opt/hh-gui/scraper
          NPM_BIN=/home/clawd/.nvm/versions/node/v22.22.0/bin/npm

          sudo mkdir -p ${DEPLOY_DIR}
          sudo cp scraper/package.json scraper/package-lock.json scraper/server.js ${DEPLOY_DIR}/
          sudo chown -R clawd:clawd ${DEPLOY_DIR}

          cd ${DEPLOY_DIR}
          ${NPM_BIN} ci --omit=dev
          ${NPM_BIN} exec playwright install chromium

          # Install/refresh the systemd unit
          sudo cp "$GITHUB_WORKSPACE/scripts/hh-scraper.service" /etc/systemd/system/hh-scraper.service
          sudo systemctl daemon-reload
          sudo systemctl enable hh-scraper
          sudo systemctl restart hh-scraper

      - name: Deploy
        run: |
          DEPLOY_DIR=/opt/hh-gui
          JAR_NAME=hh-gui.jar
          SERVICE=hh-gui

          sudo mkdir -p ${DEPLOY_DIR}

          # Backup
          sudo cp ${DEPLOY_DIR}/${JAR_NAME} ${DEPLOY_DIR}/${JAR_NAME}.backup.$(date +%Y%m%d_%H%M) 2>/dev/null || true

          # Deploy
          sudo cp backend/target/hh-gui-*.jar ${DEPLOY_DIR}/${JAR_NAME}

          # Copy config if not exists
          if [ ! -f "${DEPLOY_DIR}/config/profiles/default.yaml" ]; then
            sudo cp -r config ${DEPLOY_DIR}/
          fi

          # Migrate DB schema (add new columns if missing)
          DB_PATH="${DEPLOY_DIR}/data/vacancies.db"
          if [ -f "$DB_PATH" ]; then
            echo "Migrating database schema..."
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN source TEXT DEFAULT 'hh';" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN source_query TEXT DEFAULT '';" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN is_remote INTEGER DEFAULT 0;" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN notified INTEGER DEFAULT 0;" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN published_at TEXT DEFAULT '';" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN found_by_scan INTEGER DEFAULT 0;" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN user_id INTEGER DEFAULT NULL;" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN search_id INTEGER DEFAULT NULL;" 2>/dev/null || true
            sqlite3 "$DB_PATH" "ALTER TABLE vacancies ADD COLUMN criteria_hash TEXT DEFAULT '';" 2>/dev/null || true

            # One-time: archive the pre-browser-scraper data instead of mixing it with
            # real (full-description) analysis. Only runs once — no-op if already renamed,
            # and skipped entirely if a fresh `vacancies` table (created by the app's own
            # schema.sql on next boot) hasn't appeared yet.
            HAS_LEGACY=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM sqlite_master WHERE type='table' AND name='vacancies_legacy';")
            HAS_PERSON_COL=$(sqlite3 "$DB_PATH" "SELECT COUNT(*) FROM pragma_table_info('vacancies') WHERE name='person';")
            if [ "$HAS_LEGACY" = "0" ] && [ "$HAS_PERSON_COL" = "0" ]; then
              echo "Archiving pre-scraper vacancies table to vacancies_legacy..."
              sqlite3 "$DB_PATH" "ALTER TABLE vacancies RENAME TO vacancies_legacy;"
            fi
            echo "DB migration done"
          fi

          # Restart
          sudo systemctl restart ${SERVICE}

      - name: Smoke test
        run: |
          echo "Waiting for services to start..."
          sleep 10

          STATUS=$(sudo systemctl is-active hh-gui)
          if [ "$STATUS" != "active" ]; then
            echo "❌ App failed to start, rolling back..."
            LATEST_BACKUP=$(ls -t /opt/hh-gui/hh-gui.jar.backup.* 2>/dev/null | sed -n '2p')
            if [ -n "$LATEST_BACKUP" ]; then
              sudo cp "$LATEST_BACKUP" /opt/hh-gui/hh-gui.jar
              sudo systemctl restart hh-gui
            fi
            exit 1
          fi
          echo "✅ HH Vacancy Manager is running"

          SCRAPER_STATUS=$(sudo systemctl is-active hh-scraper)
          if [ "$SCRAPER_STATUS" != "active" ]; then
            echo "❌ Scraper sidecar failed to start (see: journalctl -u hh-scraper)"
            exit 1
          fi
          echo "✅ Scraper sidecar is running"

          # HTTP checks
          # /api/** now requires a logged-in session (see AuthInterceptor), so the
          # smoke test hits Actuator's health endpoint instead, which bypasses it.
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/actuator/health)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ HTTP check failed (code: $HTTP_CODE)"
            exit 1
          fi
          echo "✅ HH Vacancy Manager HTTP check passed (code: $HTTP_CODE)"

          SCRAPER_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8095/health)
          if [ "$SCRAPER_HTTP_CODE" != "200" ]; then
            echo "❌ Scraper health check failed (code: $SCRAPER_HTTP_CODE)"
            exit 1
          fi
          echo "✅ Scraper health check passed (code: $SCRAPER_HTTP_CODE)"

      - name: Notify Telegram
        if: always() && github.event_name != 'pull_request'
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            MSG="✅ *HH Vacancy Manager* задеплоен%0Aветка: \`${{ github.ref_name }}\`%0Aкоммит: ${{ github.sha }}"
          else
            MSG="❌ *HH Vacancy Manager* — деплой упал%0Aсмотри: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=${MSG}&parse_mode=Markdown" > /dev/null
