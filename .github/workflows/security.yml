name: Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'  # Еженедельно в понедельник в 02:00 UTC

jobs:
  sast:
    name: SAST — SpotBugs + FindSecBugs
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run SpotBugs
        run: cd backend && mvn spotbugs:check -Dmaven.test.skip=true --no-transfer-progress
        continue-on-error: true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          if-no-files-found: ignore
          retention-days: 30

  sca:
    name: SCA — Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven dependency check
        run: cd backend && mvn dependency-check:check --no-transfer-progress
        continue-on-error: true

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: backend/target/dependency-check-report.html
          retention-days: 30

  trivy:
    name: Trivy — Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-results
          path: trivy-results.txt
          retention-days: 30
