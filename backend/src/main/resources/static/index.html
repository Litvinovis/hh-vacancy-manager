<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HH Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app">
  <!-- ═══════ SIDEBAR ═══════ -->
  <div class="sidebar">
    <div class="sb">
      <div class="logo">
        <div class="logo-icon">🔍</div>
        <span>HH Monitor</span>
        <div class="theme-tg">
          <button class="theme-b active" data-theme="dark" title="Тёмная">🌙</button>
          <button class="theme-b" data-theme="light" title="Светлая">☀️</button>
        </div>
      </div>

      <div class="nav-label">Фильтры</div>
      <div class="nav-item active" data-filter="all">
        <span class="ico">📋</span> Все <span class="count" id="cnt-all">0</span>
      </div>
      <div class="nav-item" data-filter="new">
        <span class="ico">🆕</span> Новые <span class="count" id="cnt-new">0</span>
      </div>
      <div class="nav-item" data-filter="pending">
        <span class="ico">⏳</span> Не оценено <span class="count" id="cnt-pending">0</span>
      </div>
      <div class="nav-item" data-filter="favorite">
        <span class="ico">⭐</span> Избранное <span class="count" id="cnt-favorite">0</span>
      </div>
      <div class="nav-item" data-filter="applied">
        <span class="ico">📤</span> Отклик <span class="count" id="cnt-applied">0</span>
      </div>
      <div class="nav-item" data-filter="rejected">
        <span class="ico">❌</span> Отклонено <span class="count" id="cnt-rejected">0</span>
      </div>
      <div class="nav-item" data-filter="fraud">
        <span class="ico">🚫</span> Обман <span class="count" id="cnt-fraud">0</span>
      </div>

      <div class="stats-w">
        <h4>Прогресс анализа</h4>
        <div class="pl">
          <div class="bar"><div class="bar-fill" id="progress-fill" style="width:0%"></div></div>
          <div class="pct" id="progress-pct">0%</div>
        </div>
        <div class="rows">
          <div class="rs">Средний скор <span class="v" id="stat-score">—</span></div>
          <div class="rs">Ср. зарплата <span class="v" id="stat-salary">—</span></div>
        </div>
      </div>

      <div class="sb-actions">
        <button class="btn btn-prim" onclick="runPipeline()">▶️ Запустить оценку</button>
        <button class="btn btn-second" onclick="analyzePending()" id="btn-analyze-pending">⏳ Оценить все</button>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="showReanalyzeModal()">🔄 Переоц.</button>
          <button class="btn btn-ghost" onclick="exportData()">📤 Экспорт</button>
        </div>
        <button class="btn btn-ghost" onclick="showSettingsModal()" style="margin-top:8px;width:100%">⚙️ Настройки</button>
      </div>
    </div>
  </div>

  <!-- ═══════ MAIN ═══════ -->
  <div class="main">
    <div class="topbar">
      <div class="search-box">
        <span class="search-ico">🔎</span>
        <input class="search-inp" id="search-input" placeholder="Поиск по названию, компании, адресу...">
      </div>
      <select class="filter-sel" id="district-filter">
        <option value="">Все районы</option>
      </select>
      <select class="filter-sel" id="salary-filter">
        <option value="">Любая зарплата</option>
        <option value="30000">от 30К</option>
        <option value="40000">от 40К</option>
        <option value="60000">от 60К</option>
        <option value="80000">от 80К</option>
      </select>
      <select class="filter-sel" id="score-filter">
        <option value="">Любой скор</option>
        <option value="70">≥ 70</option>
        <option value="50">≥ 50</option>
        <option value="30">≥ 30</option>
      </select>
      <select class="filter-sel" id="remote-filter">
        <option value="">Все</option>
        <option value="true">Удалёнка</option>
        <option value="false">Офис</option>
      </select>
      <select class="filter-sel" id="sort-filter">
        <option value="score_desc">Скор ↓</option>
        <option value="score_asc">Скор ↑</option>
        <option value="salary_desc">Зарплата ↓</option>
        <option value="salary_asc">Зарплата ↑</option>
        <option value="date_desc">Новые</option>
        <option value="date_asc">Старые</option>
      </select>
      <button class="btn-ico" id="btn-notify-toggle" onclick="toggleNotifications()" title="Уведомления">🔔</button>
      <button class="btn-ico" onclick="loadStats();loadVacancies(1)" title="Обновить">↻</button>
    </div>

    <div class="list-cont" id="list-container">
      <div class="empty" id="empty-state">
        <div class="icon">📭</div>
        <div class="text">Нет вакансий</div>
        <div class="sub">Нажмите «Запустить оценку» для сбора данных</div>
      </div>
      <div id="vacancy-list"></div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <!-- ═══════ DETAIL ═══════ -->
  <div class="detail hidden" id="detail-panel"></div>
</div>

<script src="/js/app.js"></script>
</body>
</html>
