server:
  port: 8080

spring:
  application:
    name: hh-vacancy-manager
  datasource:
    url: jdbc:sqlite:${user.dir}/data/vacancies.db?busy_timeout=30000&journal_mode=WAL&locking_mode=NORMAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-timeout: 30000
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 0

app:
  data-dir: ${user.dir}/data
  scoring:
    rules-file: ${user.dir}/config/rules.yaml
  search:
    profiles-dir: ${user.dir}/config/profiles
  ai:
    provider: ${AI_PROVIDER:auto}
    api-url: ${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
    api-key: ${API_KEY:}
    model: ${AI_MODEL:openrouter/auto}
    fallback-url: ${AI_FALLBACK_URL:https://api.x.ai/v1/chat/completions}
    fallback-key: ${AI_FALLBACK_KEY:}
    fallback-model: ${AI_FALLBACK_MODEL:grok-3-mini}
    batch-size: 5
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}

logging:
  level:
    com.hh.gui: DEBUG
    org.springframework.jdbc: DEBUG
