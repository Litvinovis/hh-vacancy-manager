# HH Vacancy Manager — Конфигурация источников и профилей

# ─── Профили поиска ──────────────────────────────────────────────────────────
# Каждый профиль — отдельный человек с настройками

profiles:
  # Профиль по умолчанию (мама)
  mom:
    name: "Мама"
    city: "Уфа"
    priority_districts:
      - "Шакша"
      - "Калининский"
    skills:
      - "Работа с клиентами"
      - "Касса"
      - "Консультирование"
    not_suitable:
      - "Физический труд"
      - "Кол-центр"
      - "Вахта"
      - "Склад"
    search:
      queries:
        - "продавец"
        - "консультант"
        - "оператор"
        - "администратор"
        - "менеджер"
      area: 99  # Уфа
      salary_min: 0
      schedule: "fullTime"
      experience: ""
      exclude_words:
        - "водитель"
        - "грузчик"
        - "разнорабочий"
        - "курьер"
        - "вахта"
        - "кол-центр"
        - "call-центр"
        - "call center"
        - "телефон"
        - "холодн"
        - "супермаркет"
        - "гипермаркет"
        - "пятёрочка"
        - "магнит"
        - "лента"
        - "дикси"
        - "перекрёсток"
        - "склад"
        - "комплектовщик"
        - "сборщик"
        - "фасовщик"
        - "упаковщик"
        - "физическ"
        - "ручной труд"
        - "производство"
        - "завод"
        - "цех"
    remote_search:
      enabled: true
      queries:
        - "оператор ПК"
        - "модератор"
        - "администратор интернет-магазин"
        - "специалист поддержки"
        - "диспетчер"
        - "помощник руководителя"
        - "секретарь"
        - "менеджер маркетплейс"
        - "контент-менеджер"
        - "специалист чат"
      area: 113  # Россия
      salary_min: 40000
      exclude_words:
        - "кол-центр"
        - "call-центр"
        - "call center"
        - "телефон"
        - "холодн"
        - "продаж"
        - "водитель"
        - "курьер"
        - "грузчик"
        - "разнорабочий"
        - "вахта"
        - "склад"
        - "производство"
        - "завод"
        - "цех"
        - "фриланс"
        - "1С программист"
        - "программист"
        - "разработчик"
        - "тестировщик"
        - "системный администратор"
        - "DevOps"
        - "аналитик данных"
        - "Data Scientist"
    # Настройки скоринга
    scoring:
      rules_file: "config/rules.yaml"
      min_score_for_notify: 50
      max_per_run: 20
    # Настройки уведомлений
    notifications:
      enabled: true
      telegram_chat_id: "${TELEGRAM_CHAT_ID}"  # из переменных окружения
      min_score: 60  # минимальный скор для отправки
      max_per_day: 10  # макс. вакансий в день
      schedule: "0 9,12,15,18,21 * * *"  # cron

  # Пример второго профиля (можно добавить)
  # dad:
  #   name: "Папа"
  #   city: "Уфа"
  #   ...

# ─── Источники данных ─────────────────────────────────────────────────────────
sources:
  # HH.ru (RSS)
  hh_rss:
    enabled: true
    type: "rss"
    base_url: "https://hh.ru/search/vacancy/rss"
    delay: 1.5  # секунды между запросами

  # Авито Работа
  avito:
    enabled: true
    type: "web"
    base_url: "https://www.avito.ru"
    delay: 2.0
    # Города для поиска
    cities:
      - "ufa"
    # Категории вакансий на Авито
    categories:
      - "vakansii"

  # Telegram-каналы
  telegram:
    enabled: false  # включить после настройки API
    type: "telegram"
    api_id: "${TG_API_ID}"
    api_hash: "${TG_API_HASH}"
    # Каналы для мониторинга
    channels:
      - "ufa_rabota"      # Уфа Работа
      - "avito_rabota_ufa" # Авито Работа Уфа
      - "ufa_vacancies"    # Вакансии Уфы
    limit: 100  # постов с канала
    days_back: 7  # дней назад

# ─── Наскоринг ────────────────────────────────────────────────────────────────
scoring:
  rules_file: "config/rules.yaml"
  min_fit_score: 50
  max_per_run: 20

# ─── Уведомления ──────────────────────────────────────────────────────────────
telegram:
  max_vacancies_in_message: 10
